<header class="fixed inset-x-0 top-0 z-30 px-4 pt-4 sm:px-6">
  <nav class="mx-auto w-full max-w-6xl rounded-2xl border border-primary/20 bg-[#0f1b27]/85 backdrop-blur-md shadow-[0_0_30px_-16px_rgba(58,168,173,0.5)]">
    <div class="flex items-center justify-between px-4 py-3 sm:px-5">
      <a href="#inicio" class="flex items-center gap-3 nav-logo" aria-label="Ir al inicio">
        <img src="assets/images/Logo_Portafolio.png" alt="Logo Luis Gómez" class="h-9 w-9 object-contain" />
        <div class="leading-tight">
          <p class="text-sm font-semibold text-typography-title">Luis Gómez</p>
          <p class="text-[11px] text-typography-muted">Ingeniero de Sistemas</p>
        </div>
      </a>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-white/10 text-typography-title transition-colors hover:bg-white/5 md:hidden"
        (click)="toggleMenu()"
        aria-label="Abrir menú de navegación">
        <i class="fa-solid" [class.fa-bars]="!isMenuOpen" [class.fa-xmark]="isMenuOpen"></i>
      </button>

      <div class="hidden md:flex md:items-center md:gap-2 text-sm font-medium">
        <a href="#inicio" class="nav-link" [class.nav-link-active]="isActive('inicio')">Inicio</a>
        <a href="#sobre-mi" class="nav-link" [class.nav-link-active]="isActive('sobre-mi')">Sobre mí</a>
        <a href="#experiencia" class="nav-link" [class.nav-link-active]="isActive('experiencia')">Experiencia</a>
        <a href="#proyectos" class="nav-link" [class.nav-link-active]="isActive('proyectos')">Proyectos</a>
        <a href="#contacto" class="nav-link" [class.nav-link-active]="isActive('contacto')">Contacto</a>
      </div>
    </div>

    <div *ngIf="isMenuOpen" class="border-t border-white/10 px-4 pb-4 pt-3 md:hidden">
      <div class="flex flex-col gap-1 text-sm font-medium">
        <a href="#inicio" (click)="closeMenu()" class="nav-link" [class.nav-link-active]="isActive('inicio')">Inicio</a>
        <a href="#sobre-mi" (click)="closeMenu()" class="nav-link" [class.nav-link-active]="isActive('sobre-mi')">Sobre mí</a>
        <a href="#experiencia" (click)="closeMenu()" class="nav-link" [class.nav-link-active]="isActive('experiencia')">Experiencia</a>
        <a href="#proyectos" (click)="closeMenu()" class="nav-link" [class.nav-link-active]="isActive('proyectos')">Proyectos</a>
        <a href="#contacto" (click)="closeMenu()" class="nav-link" [class.nav-link-active]="isActive('contacto')">Contacto</a>
      </div>
    </div>
  </nav>
</header>
