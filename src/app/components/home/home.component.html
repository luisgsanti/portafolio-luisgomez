<div class="relative min-h-[calc(100svh-10rem)] px-4 py-2 text-center sm:py-4">
  
  <!-- (Opcional) Efecto de luz ambiental de fondo -->
  <div class="pointer-events-none absolute left-1/2 top-0 -z-0 h-[320px] w-[320px] -translate-x-1/2 rounded-full bg-primary/10 blur-[90px] sm:h-[420px] sm:w-[420px] md:h-[500px] md:w-[500px]"></div>

  <div class="relative z-10 flex min-h-[calc(100svh-11rem)] w-full flex-col items-center justify-center">
    <!-- Logo + Sombra de Neón -->
    <div class="relative mb-4 flex flex-col items-center sm:mb-6">
      <img src="../../../assets/images/Logo_Portafolio.png" alt="Logo Luis Gómez"
        class="relative z-10 w-28 drop-shadow-2xl sm:w-36 md:w-44 lg:w-60" />

      <div class="mt-[-10px] h-4 w-32 rounded-[100%] bg-primary/20 shadow-[0_0_30px_16px_rgba(58,168,173,0.35)] sm:h-5 sm:w-40 md:h-6 md:w-52"></div>
    </div>

    <!-- Nombre -->
    <h1 class="z-10 text-2xl font-bold leading-tight tracking-tight text-typography-title sm:text-3xl md:text-5xl">
      LUIS EDUARDO GÓMEZ SANTIAGO
    </h1>
    
    <!-- Cargo / Subtítulo -->
    <h2 class="z-10 mt-1 text-sm font-medium uppercase tracking-wide text-primary sm:text-base md:text-lg">
      Ingeniero de Sistemas
    </h2>

    <!-- Descripción -->
    <p class="z-10 mt-3 max-w-xl text-sm leading-relaxed text-typography-body sm:mt-4 sm:text-base md:text-[1.03rem]">
      Construyo soluciones innovadoras con <span class="font-semibold text-primary/80">código limpio</span> y diseño eficiente.
    </p>

    <a [href]="cvUrl" target="_blank" rel="noopener noreferrer"
      class="z-10 mt-4 inline-flex items-center gap-2 rounded-xl bg-primary px-5 py-2.5 text-sm font-semibold text-white shadow-[0_0_15px_rgba(58,168,173,0.4)] transition-all duration-300 hover:-translate-y-1 hover:bg-primary-hover hover:shadow-[0_0_25px_rgba(58,168,173,0.6)] sm:mt-5 sm:px-6 sm:py-2.5 sm:text-base">
      <i class="fa-solid fa-file-arrow-down"></i>
      Descargar Curriculum
    </a>

    <!-- Redes sociales -->
    <div class="z-10 mt-5 flex gap-6 text-xl sm:mt-6 sm:gap-8 sm:text-2xl">
      <!-- Iconos: Empiezan en un gris apagado y se encienden al pasar el mouse -->

      <a href="https://www.linkedin.com/in/ingluisegomez3006" target="_blank" rel="noopener noreferrer" class="text-typography-muted transition-all duration-300 hover:scale-110 hover:text-primary">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
      <a href="https://github.com/luisgsanti" target="_blank" rel="noopener noreferrer" class="text-typography-muted transition-all duration-300 hover:scale-110 hover:text-primary">
        <i class="fa-brands fa-github"></i>
      </a>
    </div>
  </div>
</div>
